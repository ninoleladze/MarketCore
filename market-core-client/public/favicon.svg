<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c45c00"/>
      <stop offset="100%" stop-color="#ff9a3c"/>
    </linearGradient>
  </defs>
  <!-- Market trend / M shape -->
  <polyline
    points="10,48 20,26 32,36 44,16 54,28"
    stroke="white" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Peak dot -->
  <circle cx="44" cy="16" r="5" fill="white"/>
  <!-- Base line -->
  <line x1="10" y1="48" x2="54" y2="48"
    stroke="rgba(255,255,255,0.3)" stroke-width="2.5"
    stroke-linecap="round"/>
</svg>
